<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Esfera Cromática</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
        }

        /* A "mágica" da esfera acontece no border-radius e no radial-gradient */
        .esfera {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background-color: #3498db;
            cursor: pointer;
            transition: background 0.5s ease, transform 0.3s ease;
           
            /* Sombra interna para dar efeito 3D */
            box-shadow: inset -20px -20px 50px rgba(0,0,0,0.5),
                        10px 10px 30px rgba(0,0,0,0.3);
           
            /* Brilho inicial */
            background: radial-gradient(circle at 30% 30%, #5dade2, #2e86c1);
        }

        .esfera:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="esfera" id="bola"></div>

    <script>
        const esfera = document.getElementById('bola');

        function gerarCorAleatoria() {
            const letras = '0123456789ABCDEF';
            let cor = '#';
            for (let i = 0; i < 6; i++) {
                cor += letras[Math.floor(Math.random() * 16)];
            }
            return cor;
        }

        esfera.addEventListener('mouseenter', () => {
            const novaCor = gerarCorAleatoria();
            // Aplicamos o gradiente para manter o efeito de esfera 3D
            esfera.style.background = `radial-gradient(circle at 30% 30%, #ffffff, ${novaCor})`;
        });
    </script>
</body>
</html>
